<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Apology App</title>\n    <style>\n        body {\n            background-color: #ffccdc;\n            color: #900;\n            font-family: Arial, sans-serif;\n            text-align: center;\n            animation: fadeIn 1s;\n        }\n        h1 {\n            margin-top: 50px;\n            font-size: 2.5em;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; }\n            to { opacity: 1; }\n        }\n        .message {\n            font-size: 1.5em;\n            margin: 20px;\n        }\n        .apologize-button {\n            background-color: #ff6f91;\n            border: none;\n            color: white;\n            padding: 15px 30px;\n            font-size: 1em;\n            cursor: pointer;\n            border-radius: 5px;\n            transition: transform 0.2s;\n        }\n        .apologize-button:hover {\n            transform: scale(1.1);\n        }\n    </style>\n</head>\n<body>\n    <h1>I'm Sorry!</h1>\n    <div class="message">Please accept my sincere apologies.</div>\n    <button class="apologize-button" onclick="playApology()">Apologize</button>\n    <script>\n        function playApology() {\n            alert('Apology is on its way!');\n        }\n    </script>\n</body>\n</html>
