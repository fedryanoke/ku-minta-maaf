<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apology App</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff69b4;
            font-size: 2em;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 0); }
            50% { transform: translate(5px, 0); }
            75% { transform: translate(-5px, 0); }
            100% { transform: translate(0, 0); }
        }
        .heart {
            color: #ff1493;
            font-size: 50px;
        }
        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }
        button:hover {
            opacity: 0.8;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Aku Minta Maaf</h1>
    <div class="heart">❤️❤️❤️</div>
    <button id="openModal">Open Message</button>

    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <p>Aku Peduli Kamu 1 Juta Septiliun Kali</p>
      </div>
    </div>

    <script>
        // Get modal element
        var modal = document.getElementById('myModal');

        // Get open modal button
        var openModal = document.getElementById('openModal');

        // Get close button
        var closeButton = document.getElementsByClassName('close')[0];

        // Define event listener for open button
        openModal.onclick = function() {
            modal.style.display = 'block';
            incrementCounter();
        }

        // Define event listener for close button
        closeButton.onclick = function() {
            modal.style.display = 'none';
        }

        // Close modal if outside click
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // LocalStorage to save counter
        function incrementCounter() {
            let counter = localStorage.getItem('apologyCounter') || 0;
            counter++;
            localStorage.setItem('apologyCounter', counter);
            console.log('Counter:', counter);
        }
    </script>
</body>
</html>
